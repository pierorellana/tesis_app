<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arquitectura General - Tesis App</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ffffff;
    font-family: 'Manrope', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 32px;
  }

  .wrapper { max-width: 1200px; width: 100%; }

  .header { margin-bottom: 28px; }
  .header-row { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .header h1 { font-size: 22px; font-weight: 700; color: #101828; letter-spacing: -0.2px; }
  .chip {
    font-size: 11px;
    font-weight: 600;
    color: #4f46e5;
    background: #eef2ff;
    padding: 4px 10px;
    border-radius: 18px;
  }
  .subtitle { font-size: 13px; color: #6b7280; }

  .diagram {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 180px;
  }

  .role-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .role-label {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #94a3b8;
  }

  .card {
    border-radius: 14px;
    background: #f7f8fb;
    border: 1.5px solid #e2e5ea;
    padding: 20px 18px;
  }
  .card-title { font-size: 15px; font-weight: 700; color: #111827; margin-bottom: 6px; }
  .card-sub { font-size: 12px; color: #6b7280; margin-bottom: 14px; }
  .card-icon { display: flex; justify-content: center; }
  .card-icon img,
  .card-icon svg { width: 40px; height: 40px; object-fit: contain; display: block; }

  .card-client {
    width: 150px;
    flex-shrink: 0;
    background: #f7f8fb;
    border-color: #e2e5ea;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 120px;
    padding: 12px 10px;
  }

  .card-backend {
    flex: 1;
    min-height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f7f8fb;
    border-color: #e2e5ea;
    text-align: center;
  }

  .logo-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .logo-stack .logo-python { width: 44px; height: 44px; }
  .logo-stack .logo-fastapi { width: 96px; height: 18px; }

  .card-integration {
    width: 260px;
    flex-shrink: 0;
    background: #f7f8fb;
    border: 1.5px solid #e2e5ea;
    border-radius: 14px;
    padding: 12px 10px 10px;
    text-align: center;
  }
  .card-integration .card-title {
    font-size: 12px;
    margin-bottom: 10px;
    color: #1f2937;
  }
  .flow-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .flow-node {
    width: 56px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1.15;
  }
  .flow-icon {
    width: 26px;
    height: 26px;
    border-radius: 6px;
    background: #f1f5f9;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 4px;
  }
  .flow-label { font-size: 9.5px; font-weight: 600; color: #475569; }
  .flow-sub { font-size: 8.5px; color: #94a3b8; }
  .flow-arrow {
    width: 16px;
    height: 2px;
    background: #cbd5e1;
    position: relative;
  }
  .flow-arrow::after {
    content: '';
    position: absolute;
    right: -2px;
    top: -4px;
    border-left: 6px solid #cbd5e1;
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
  }

  .frontend-col {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .v-connector {
    position: absolute;
    top: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 24px;
  }
  .frontend-col .card-integration {
    position: absolute;
    top: calc(100% + 40px);
    left: 50%;
    transform: translateX(-50%);
  }

  .connector {
    width: 110px;
    flex-shrink: 0;
    display: flex;
    justify-content: center;
  }

  .device-block {
    width: 120px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .device-icon {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: #f1f5f9;
    border: 1.5px solid #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .externals {
    width: 190px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .ext-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.4px;
    color: #60a5fa;
    text-transform: none;
    padding-left: 0;
    margin-bottom: 2px;
    text-align: center;
    width: 100%;
    white-space: nowrap;
  }
  .ext-card {
    background: #f7f8fb;
    border: 1.5px solid #e2e5ea;
    border-radius: 12px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .ext-ico {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .ext-name { font-size: 12px; font-weight: 600; color: #1f2937; }
  .ext-type { font-size: 10px; color: #9ca3af; margin-top: 1px; }

  .footer { margin-top: 22px; display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 7px; font-size: 11px; color: #6b7280; }
  .leg-line { width: 24px; height: 2px; border-radius: 2px; }
  .leg-solid { background: #94a3b8; }
  .leg-dashed { background: repeating-linear-gradient(90deg, #60a5fa 0 5px, transparent 5px 9px); }
</style>
</head>
