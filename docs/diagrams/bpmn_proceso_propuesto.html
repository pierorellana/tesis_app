<!DOCTYPE html>

<!-- ═══ POOL TITLE BAR ═══ -->
<rect x="8" y="8" width="1584" height="40" rx="6" fill="#1e3a5f"/>

</text>

<text x="360" y="421" text-anchor="middle" font-size="12.5" fill="#047857">(validación)</text>

<text x="297" y="730" text-anchor="middle" font-size="12.5" fill="#047857">+ abrir acceso</text>

<text x="519" y="718" text-anchor="middle" font-size="13" fill="#7c2d12">denegado"</text>

<text x="297" y="863" text-anchor="middle" font-size="12" fill="#14532d" font-weight="bold">FIN</text>

<rect x="767" y="372" width="225" height="85" rx="8" fill="#a7f3d0" stroke="#059669" stroke-width="1.8" filter="url(#shadow)"/>

<text x="1150" y="753" text-anchor="middle" font-size="12" fill="#7f1d1d" font-weight="bold">FIN</text>

<!-- ════════════════════════════════════════ -->
<!--  CARRIL RESIDENTE                       -->
<!-- ════════════════════════════════════════ -->

<!-- ── T_RES: Residente decide  center(880,920) rect(765,889,230,62) ── -->

<text x="640" y="1033" text-anchor="middle" font-size="13" fill="#7c2d12">+ registrar evento</text>

<!-- ── END DENY AUTH  cx=640, cy=1130 ── -->
<circle cx="640" cy="1130" r="22" fill="#fecaca" stroke="#dc2626" stroke-width="4" filter="url(#shadow)"/>
<circle cx="640" cy="1130" r="14" fill="#ef4444"/>
<text x="640" y="1163" text-anchor="middle" font-size="12" fill="#7f1d1d" font-weight="bold">FIN</text>

<!--  POST-AUTORIZACIÓN (Sistema, derecha)   -->
<!-- ════════════════════════════════════════ -->

<text x="1380" y="706" text-anchor="middle" font-size="13" fill="#064e3b">+ abrir acceso (backend)</text>

<!-- ── END OK NO-QR  cx=1380, cy=830 ── -->
<circle cx="1380" cy="830" r="22" fill="#bbf7d0" stroke="#16a34a" stroke-width="4" filter="url(#shadow)"/>
<circle cx="1380" cy="830" r="14" fill="#22c55e"/>
<text x="1380" y="863" text-anchor="middle" font-size="12" fill="#14532d" font-weight="bold">FIN</text>
